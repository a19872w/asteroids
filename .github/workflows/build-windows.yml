name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # lets you trigger it manually from the GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # match Nuitka's well-supported version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka pygame

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --onefile --include-package=pygame --assume-yes-for-downloads main.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: main.exe
